<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crudazon - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body
    class="d-flex flex-column"
    style="
      background: radial-gradient(
        circle,
        rgba(97, 97, 97, 1) 0%,
        rgba(64, 64, 64, 1) 50%
      );
      min-height: 100dvh;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    "
  >
    <header>
      <nav class="navbar navbar-expand-lg bg-secondary-subtle p-3">
        <div class="container-fluid">
          <a
            class="navbar-brand fw-bolder text-warning text-decoration-underline fst-italic fs-2 lh-base pt-0"
            href="#"
            >Crud<span class="text-light">Azon</span></a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./backoffice.html">Backoffice</a>
              </li>
            </ul>
          </div>
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <button
                href="#"
                class="fw-bold p-2 btn btn-outline-light position-relative"
                data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasExample"
                aria-controls="offcanvasExample"
              >
                <span
                  id="cart-badge"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning visually-hidden text-black"
                >
                </span
                >Cart
              </button>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <div class="container mt-4">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10">
            <h2 class="h2 text-center mb-4">
              Welcome to
              <span
                class="fs-1 fst-italic fw-bolder text-decoration-underline text-warning"
                >Crud<span class="text-light">Azon</span></span
              >
            </h2>
            <div class="container">
              <div
                id="cards-space"
                class="row justify-content-center align-items-stretch"
              >
                <div id="spinner" class="spinner-border mt-4" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- OFFCANVAS -->
      <div
        class="offcanvas offcanvas-end"
        tabindex="-1"
        id="offcanvasExample"
        aria-labelledby="offcanvasExampleLabel"
      >
        <div class="offcanvas-header">
          <h5 class="offcanvas-title" id="offcanvasExampleLabel">Cart:</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body bg-body-tertiary">
          <ul id="cart-list" class="p-0"></ul>
          <p id="total-display" class="mt-5 fw-bold"></p>
          <button id="buy-btn" class="btn btn-success">Buy</button>
        </div>
      </div>
    </main>
    <footer class="bg-secondary-subtle py-4 text-center mt-5">
      <p><span id="footer-year"></span> - Crudazon</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
