<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crudazon - Backoffice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body
    class="d-flex flex-column"
    style="
      background: radial-gradient(
        circle,
        rgba(97, 97, 97, 1) 0%,
        rgba(64, 64, 64, 1) 50%
      );
      min-height: 100dvh;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    "
  >
    <header>
      <nav class="navbar navbar-expand-lg bg-secondary-subtle p-3">
        <div class="container-fluid">
          <a
            class="navbar-brand fw-bolder text-warning text-decoration-underline fst-italic fs-2 lh-base pt-0"
            href="#"
            >Crud<span class="text-light">Azon</span></a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="./index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Backoffice</a
                >
              </li>
            </ul>
            <form id="search-form" class="d-flex w-50" role="search">
              <label
                for="search-input"
                class="mb-0 text-nowrap d-flex align-items-center me-2 fw-bold"
                >Enter product id to edit</label
              >
              <input
                id="search-input"
                class="form-control me-2 flex-grow-1"
                type="search"
                placeholder="Es. 69e1f23b739f8700157ab098"
                aria-label="Search"
              />
              <button class="btn btn-outline-warning" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <!-- DELETE MODAL -->
      <div
        class="modal fade"
        id="deleteModal"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">
                Delete Product
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              Are you sure you do want to delete this product?
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button
                id="delete-confirm-btn"
                type="button"
                class="btn btn-danger"
                data-bs-dismiss="modal"
              >
                Delete
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- UPDATE MODAL -->
      <div
        class="modal fade"
        id="updateModal"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="exampleModalLabel">
                Update Item
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              Are you sure you do want to update this product?
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Close
              </button>
              <button
                id="update-confirm-btn"
                type="button"
                class="btn btn-primary"
                data-bs-dismiss="modal"
              >
                Update
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="container mt-4">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <h2 class="h2 text-center mb-4">Register your product:</h2>
            <p
              id="message-display"
              class="mt-2 fw-bold fs-3 text-decoration-underline text-center"
            ></p>
            <form
              id="form"
              class="d-flex flex-column align-items-center gap-3 p-3 border border-1 border-light rounded-3 bg-dark"
            >
              <label for="name-input">Product Name:</label>
              <input
                class="w-100 p-2"
                id="name-input"
                type="text"
                placeholder="Insert product name"
                required
              />
              <label for="description">Product Description:</label>
              <textarea
                id="description-input"
                class="text-start w-100 p-2"
                placeholder="Insert product description"
              ></textarea>
              <label for="brand-input">Product Brand:</label>
              <input
                id="brand-input"
                class="w-100 p-2"
                type="text"
                placeholder="Insert product brand"
                required
              />
              <label for="image-input">Product Image Url:</label>
              <input
                id="image-input"
                class="w-100 p-2"
                type="text"
                placeholder="Insert product image url"
                required
              />
              <label for="price-input">Product Price:</label>
              <input
                id="price-input"
                class="w-100 p-2"
                type="number"
                placeholder="Insert product price"
                required
              />
              <div class="d-flex justify-content-evenly w-100">
                <button
                  id="delete-btn"
                  type="button"
                  class="btn btn-outline-danger d-none w-25"
                  data-bs-toggle="modal"
                  data-bs-target="#deleteModal"
                >
                  Delete
                </button>
                <button id="submit-btn" class="btn btn-outline-warning w-25">
                  Submit
                </button>
                <button type="reset" class="btn btn-outline-light w-25">
                  Reset
                </button>
                <button
                  id="update-btn"
                  type="button"
                  class="btn btn-outline-primary d-none w-25"
                  data-bs-toggle="modal"
                  data-bs-target="#updateModal"
                >
                  Update
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer class="bg-secondary-subtle py-4 text-center mt-5">
      <p><span id="footer-year"></span> - Crudazon</p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="backoffice.js"></script>
  </body>
</html>
